name: CI/CD Pipeline for Payment Service

on:
  push:
    branches:
      - '**'

jobs:
  ci-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-mock
        if [ -f payment/requirements.txt ]; then pip install -r payment/requirements.txt; fi

    - name: Run payment tests
      run: |
        pytest payment/

  cd-deployment:
    runs-on: ubuntu-latest
    needs: ci-tests
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./payment
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/payment-service:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/payment-service:${{ github.ref_name }}